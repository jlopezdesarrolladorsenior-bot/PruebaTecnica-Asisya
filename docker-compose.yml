services:
  db:
    image: postgres:15-alpine
    container_name: asisya_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=asisya_pass
      - POSTGRES_DB=asisya_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Asisya.API/Dockerfile
    container_name: asisya_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=asisya_db;Username=admin;Password=asisya_pass
      - Jwt__Key=TuClaveSuperSecretaDeAlMenos32Caracteres!
      - Jwt__Issuer=AsisyaAPI
      - Jwt__Audience=AsisyaUsers

volumes:
  postgres_data: